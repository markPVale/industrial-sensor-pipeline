; =============================================================================
; PlatformIO Project Configuration — ESP32-S3 Industrial Sensor Node
; Target hardware: ESP32-S3 N16R8 (16MB Flash, 8MB Octal PSRAM)
; =============================================================================

[env:esp32s3-n16r8]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; -----------------------------------------------------------------------------
; Flash & Partition Layout
; -----------------------------------------------------------------------------
; The stock esp32-s3-devkitc-1 board definition defaults to 8MB flash.
; Override to 16MB and use the built-in arduino-esp32 16MB partition table.
; NOTE: Verify your physical chip is N16Rxx before flashing. Writing past the
;       actual flash boundary will silently corrupt data or fail to boot.
board_build.flash_size   = 16MB
board_upload.flash_size  = 16MB
board_build.partitions   = default_16MB.csv

; -----------------------------------------------------------------------------
; PSRAM — Octal (OPI) Mode
; -----------------------------------------------------------------------------
; N16R8 uses OPI (Octal Peripheral Interface) PSRAM, not the more common QSPI
; variant found on N8R8 modules.
;   qio_opi  = QIO flash  +  OPI PSRAM  <- correct for N16R8
;   qio_qspi = QIO flash  +  QSPI PSRAM <- for standard N8R8 boards
; This flag selects the matching bootloader binary from arduino-esp32 prebuilts.
board_build.arduino.memory_type = qio_opi

; -----------------------------------------------------------------------------
; Build Flags
; -----------------------------------------------------------------------------
build_flags =
    -DBOARD_HAS_PSRAM            ; Tells ESP-IDF/Arduino core to initialise PSRAM
    -DARDUINO_USB_MODE=1         ; Native USB (not UART bridge) — required for S3
    -DARDUINO_USB_CDC_ON_BOOT=1  ; Serial over USB CDC available from boot
    -I include                   ; Expose project include/ to all lib compilations

; -----------------------------------------------------------------------------
; Library Dependencies
; -----------------------------------------------------------------------------
lib_deps =
    knolleary/PubSubClient        ; MQTT client
    adafruit/Adafruit MPU6050     ; IMU driver (pulls in Unified Sensor + BusIO)
    bblanchon/ArduinoJson         ; JSON serialisation for telemetry payloads

; -----------------------------------------------------------------------------
; Serial Monitor
; -----------------------------------------------------------------------------
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
