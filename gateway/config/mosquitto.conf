# =============================================================================
# Mosquitto Configuration — Local Development / Simulation
# WARNING: allow_anonymous is ON. Add password_file before any deployment.
# =============================================================================

# --- Standard MQTT listener ---
listener 1883
allow_anonymous true

# --- WebSocket listener (used by Next.js dashboard) ---
listener 9001
protocol websockets
allow_anonymous true

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
